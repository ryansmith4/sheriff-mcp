name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write       # Required for Sigstore OIDC signing, SLSA provenance, and MCP Registry
  packages: write       # Required for ghcr.io Docker push
  pull-requests: write  # Required for README update PR
  attestations: write   # Required for GitHub artifact attestations

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build and test
        run: ./gradlew build

      - name: Build fat JAR
        run: ./gradlew fatJar

      - name: Generate SBOM
        run: ./gradlew cyclonedxDirectBom

      - name: Run JReleaser
        run: ./gradlew jreleaserFullRelease --no-configuration-cache
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign JAR with Sigstore
        run: |
          JAR=$(ls build/libs/sheriff-mcp-*-all.jar)
          JAR_NAME=$(basename "$JAR")
          cosign sign-blob --yes --bundle "${JAR_NAME}.sigstore.json" "$JAR"

      - name: Sign SBOM with Sigstore
        run: |
          cosign sign-blob --yes --bundle "bom.json.sigstore.json" build/reports/cyclonedx-direct/bom.json

      - name: Upload signatures to release
        run: gh release upload "${{ github.ref_name }}" *.sigstore.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest JAR provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: build/libs/sheriff-mcp-*-all.jar

      - name: Attest SBOM
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: build/reports/cyclonedx-direct/bom.json

  docker:
    needs: release
    if: ${{ !contains(github.ref_name, '-') }}  # Skip pre-releases (e.g., v1.0.0-beta1)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build and push Docker image
        run: |
          MAJOR=$(echo "${{ steps.version.outputs.version }}" | cut -d. -f1)
          ./gradlew jib -Djib.to.tags=${{ steps.version.outputs.version }},$MAJOR,latest --no-configuration-cache
        env:
          JIB_USERNAME: ${{ github.actor }}
          JIB_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign Docker image with Sigstore
        run: |
          IMAGE="ghcr.io/ryansmith4/sheriff-mcp"
          DIGEST=$(cat build/jib-image.digest)
          echo "Signing ${IMAGE}@${DIGEST}"
          cosign sign --yes "${IMAGE}@${DIGEST}"
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Read image digest
        id: digest
        run: echo "digest=$(cat build/jib-image.digest)" >> "$GITHUB_OUTPUT"

      - name: Attest Docker image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/ryansmith4/sheriff-mcp
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Generate container SBOM
        run: |
          IMAGE="ghcr.io/ryansmith4/sheriff-mcp"
          DIGEST=$(cat build/jib-image.digest)
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft "${IMAGE}@${DIGEST}" -o cyclonedx-json=container-sbom.json

      - name: Attest container SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4
        with:
          subject-name: ghcr.io/ryansmith4/sheriff-mcp
          subject-digest: ${{ steps.digest.outputs.digest }}
          sbom-path: container-sbom.json
          push-to-registry: true

  mcp-registry:
    needs: docker
    if: ${{ !contains(github.ref_name, '-') }}  # Skip pre-releases
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update server.json for publish
        run: |
          jq --arg ver "${{ steps.version.outputs.version }}" \
             --arg img "ghcr.io/ryansmith4/sheriff-mcp:${{ steps.version.outputs.version }}" \
             '.version = $ver | .packages[0].identifier = $img | del(.packages[0].version)' \
             server.json > server.tmp.json
          mv server.tmp.json server.json

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

  update-readme:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !contains(github.ref_name, '-') }}  # Skip pre-releases

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in README
        run: |
          sed -i 's/sheriff-mcp-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/sheriff-mcp-${{ steps.version.outputs.version }}/g' README.md
          sed -i 's/VERSION=[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/VERSION=${{ steps.version.outputs.version }}/g' README.md

      - name: Create pull request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          commit-message: "docs: update README version to ${{ steps.version.outputs.version }}"
          title: "docs: update README version to ${{ steps.version.outputs.version }}"
          body: |
            Automated version update from release `${{ github.ref_name }}`.

            Updates JAR filename references in README.md to version `${{ steps.version.outputs.version }}`.
          branch: readme-version-update
          delete-branch: true
